apiVersion: apps/v1
kind: Deployment

metadata:
  name: admin

spec:
  replicas: 1

  selector:
    matchLabels:
      app: admin

  template:
    metadata:
      labels:
        app: admin

    spec:
      containers:
      - name: admin
        image: 800309353218.dkr.ecr.ap-south-1.amazonaws.com/tomato-admin:latest

        ports:
        - containerPort: 5174

---

apiVersion: v1
kind: Service

metadata:
  name: admin-service

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  type: LoadBalancer

  selector:
    app: admin

  ports:
    - port: 80
      targetPort: 5174