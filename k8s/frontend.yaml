apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: 800309353218.dkr.ecr.ap-south-1.amazonaws.com/tomato-frontend:latest

        ports:
        - containerPort: 5173

---

apiVersion: v1
kind: Service

metadata:
  name: frontend-service

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing

spec:
  type: LoadBalancer

  selector:
    app: frontend

  ports:
    - port: 80
      targetPort: 5173