apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: 547268988661.dkr.ecr.ap-south-1.amazonaws.com/tomato-frontend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80