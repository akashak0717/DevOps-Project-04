version: "3.8"

services:

  backend:
    build:
      context: ./backend
    container_name: tomato-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: tomato-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
    container_name: tomato-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped